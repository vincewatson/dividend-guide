<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>食息指南 — 管理后台</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: #f4f2f7;
    }
  </style>
</head>
<body>
  <script>
  window.CMS_MANUAL_INIT = true;

  window.CMS_CONFIG = {
    backend: {
      name: "github",
      repo: "vincewatson/dividend-guide",
      branch: "main",
      base_url: "https://dividend-guide.cn",
      auth_endpoint: "api/oauth"
    },
    media_folder: "images/uploads",
    public_folder: "/images/uploads",
    collections: [
      {
        name: "blog",
        label: "博客文章",
        label_singular: "文章",
        folder: "blog",
        create: true,
        delete: true,
        format: "frontmatter",
        slug: "{{year}}-{{month}}-{{day}}-{{slug}}",
        preview_path: "blog/{{slug}}",
        editor: { preview: false },
        fields: [
          { label: "标题", name: "title", widget: "string" },
          { label: "发布日期", name: "date", widget: "datetime", format: "YYYY-MM-DD" },
          { label: "标签", name: "tags", widget: "list", allow_add: true, hint: "如：食息周报、投资心得、知识科普" },
          { label: "摘要", name: "excerpt", widget: "text", hint: "列表页显示的简短描述", required: false },
          { label: "正文", name: "body", widget: "markdown" }
        ]
      },
      {
        name: "blogIndex",
        label: "博客索引",
        delete: false,
        format: "json",
        files: [
          {
            name: "posts",
            label: "文章列表",
            file: "blog/posts.json",
            fields: [
              {
                label: "文章列表",
                name: "posts",
                widget: "list",
                fields: [
                  { label: "链接标识", name: "slug", widget: "string", hint: "对应 .md 文件的文件名（不含 .md）" },
                  { label: "标题", name: "title", widget: "string" },
                  { label: "发布日期", name: "date", widget: "datetime", format: "YYYY-MM-DD" },
                  { label: "标签", name: "tags", widget: "list" },
                  { label: "摘要", name: "excerpt", widget: "text" }
                ]
              }
            ]
          }
        ]
      }
    ]
  };
  </script>
  <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
  <script>
  // Wait for CMS to be ready, then init with inline config
  function tryInit() {
    if (typeof CMS !== 'undefined' && CMS.init) {
      CMS.init({ config: window.CMS_CONFIG });
    } else {
      setTimeout(tryInit, 200);
    }
  }
  tryInit();
  </script>
</body>
</html>
