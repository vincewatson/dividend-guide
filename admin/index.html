<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>食息指南 — 管理后台</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: #f4f2f7;
    }
    /* 登录页自定义背景 */
    .cms-login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #001AFF 0%, #4A7CFF 100%);
    }
    .cms-login-card {
      background: #fff;
      padding: 40px 48px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .cms-login-card .logo {
      font-size: 40px;
      font-weight: 700;
      color: #001AFF;
      margin-bottom: 8px;
    }
    .cms-login-card h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1c1c1e;
      margin-bottom: 4px;
    }
    .cms-login-card p {
      font-size: 13px;
      color: #8e8e93;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
</body>
</html>
